name: Dependency Review

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "Directory.Packages.props"
  workflow_dispatch:

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run dependency review
        uses: actions/dependency-review-action@v4.8.2
        with:
          fail-on-severity: moderate