name: Unit Tests

permissions:
  contents: read

on:
  pull_request:
  workflow_dispatch:


jobs:
    build-and-test: 
        name: Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v5
            
            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                global-json-file: './global.json'
                dotnet-version: 10.0

            - name: Restore Dependencies
              run: dotnet restore ./TMS.slnx
            
            - name: Build Solution
              run: dotnet build --no-restore

            - name: Run Tests
              run: dotnet test --project ./TMS.UnitTests/TMS.UnitTests.csproj --verbosity normal